    **2011 - 2013** 
    
    Nutscale Reservoir has suffered negative changes in water quality, increasing the cost to both the supplier (Wessex Water) and consumer. This project sought to understand if there was a link between moorland restoration and the water quality issues. I lead the fieldwork, laboratory and data analysis, and report writing.
       

