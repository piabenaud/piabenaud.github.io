    **2018 - Present** 
    
    Despite hydrological success, the physical restoration works carried out on Exmoor have resulted in limited vegetation change, to-date. This project is investigating the viability of sphagnum reintroduction alongside the existing restoration work. I supported the design, establishment and monitoring of the study prior to the commencement of a PhD researcher, and provide ongoing informal PhD supervision.
  
   
- layout: top-middle
  name: Piloting a cost-effective framework for monitoring soil erosion in England and Wales
  #link: na
  #github: na
  #quote: >
    #This is obviously made up.
  description: | # this will include new lines to allow paragraphs
    **2013 - 2018**
    
    Attempts to quantify soil erosion nationally have illustrated that soil erosion can occur in the UK, however, understanding whether or not the UK has a soil erosion problem still remains a question to be answered. This Defra-funded project established a framework for monitoring soil erosion at a national scale, and compared the cost-effectiveness of different monitoring approaches. My contributions included the review and construction of interactive geodatabase and web-map of existing UK-based soil erosion work. I also critically explored the application of novel proximal sensing technologies and tracers for the quantification of soil loss.
 
    
