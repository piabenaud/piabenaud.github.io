# About Section
# about_title: About Me
about_profile_image: images/profile.jpg
about_content: | # this will include new lines to allow paragraphs
 I am interested in how alterations to hydrological connectivity and vegetation communities can mitigate land degradation issues, with a primary focus on understanding how restoring natural habitat function can reduce soil erosion and associated processes. 
 
 I take an interdisciplinary approach to monitoring structural and functional change, combining fieldwork and laboratory analysis with proximal and remote sensing technologies, and geospatial analysis; delivering a spatial and temporal understanding of environmental change. 
 
 My research has impacted upon Defra soil erosion policy, water industry funding of peatland restoration and the management of landfill in Australia. I deliver fundamental scientific understanding through my research, but, critically, maintain a strong dialogue with end users to maximise knowledge exchange.

